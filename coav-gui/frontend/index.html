<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>COAV — Contrail Avoidance System</title>
  </head>
  <body>
    <div id="app"></div>
    <!-- Runtime backend URL injected by nginx at container startup via /config.js -->
    <!-- In local dev (Vite), this 404s silently and window.BACKEND_URL stays undefined -->
    <script src="/config.js" onerror="window.BACKEND_URL=''"></script>
    <script type="module" src="/src/main.ts"></script>
    <!-- Cloudflare Web Analytics — cookieless, per-hostname; token is public by design -->
    <script defer src="https://static.cloudflareinsights.com/beacon.min.js"
            data-cf-beacon='{"token": "a45b7d7003c3435e877d055a2e284d57"}'></script>
    <!-- End Cloudflare Web Analytics -->
  </body>
</html>
