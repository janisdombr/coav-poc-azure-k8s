<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>COAV — Contrail Avoidance System</title>

  <body>
    <div id="app"></div>
    <!-- Runtime backend URL injected by nginx at container startup via /config.js -->

    <script type="module" src="/src/main.ts"></script>
  </body>
