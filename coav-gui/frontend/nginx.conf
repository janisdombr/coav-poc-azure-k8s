server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Injects BACKEND_URL (set via env var) as a JS global at container startup.
    # Vue reads window.BACKEND_URL to build absolute API and WebSocket URLs.
    # For local dev (Vite), BACKEND_URL is undefined and relative paths are used instead.
    location = /config.js {
        add_header Content-Type "application/javascript";
        return 200 'window.BACKEND_URL="${BACKEND_URL}";';
    }

    # Vue SPA — all unknown paths served as index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}
