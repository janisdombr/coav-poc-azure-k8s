server.port=8080
spring.application.name=coav-gui-backend
# Azure Event Hub connection string — injected from CONN_STR env var (K8s secret or local export)
# Not required when running with --spring.profiles.active=mock
eventhub.connection-string=${CONN_STR:}

# Suppress verbose Azure SDK / AMQP reactor noise
logging.level.com.azure=WARN
logging.level.com.azure.core.amqp=ERROR
logging.level.reactor.netty=ERROR
logging.level.io.netty=ERROR
