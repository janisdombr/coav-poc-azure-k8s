name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_call:  # allows cd.yml to call this as a reusable workflow

jobs:
  backend-tests:
    name: Backend — Maven (44 tests)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run tests in Maven Docker image
        run: |
          docker run --rm \
            -v "$PWD/coav-gui/backend":/build \
            -w /build \
            maven:3.9-eclipse-temurin-21-alpine \
            mvn test -q

  frontend-build:
    name: Frontend — TypeScript + build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: coav-gui/frontend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: coav-gui/frontend

      - name: Type-check and build
        run: npm run build
        working-directory: coav-gui/frontend

      - name: Unit tests
        run: npm test
        working-directory: coav-gui/frontend

  emulator-tests:
    name: Emulator — pytest (22 tests)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: edge-emulator/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt
        working-directory: edge-emulator

      - name: Run pytest
        run: python -m pytest test_emulator.py -v
        working-directory: edge-emulator

  k6-smoke:
    name: k6 smoke — API endpoints
    runs-on: ubuntu-latest
    needs: backend-tests
    steps:
      - uses: actions/checkout@v4

      - name: Start backend in mock mode
        run: |
          docker build -t coav-backend-ci ./coav-gui/backend
          docker run -d -p 8080:8080 \
            -e SPRING_PROFILES_ACTIVE=mock \
            --name coav-backend-ci \
            coav-backend-ci
          # Wait for Spring Boot to be ready
          for i in $(seq 1 30); do
            curl -sf http://localhost:8080/api/issr-zones && break
            sleep 2
          done

      - name: Install k6
        run: |
          sudo gpg -k
          sudo gpg --no-default-keyring --keyring /usr/share/keyrings/k6-archive-keyring.gpg \
            --keyserver hkp://keyserver.ubuntu.com:80 --recv-keys C5AD17C747E3415A3642D57D77C6C491D6AC1D69
          echo "deb [signed-by=/usr/share/keyrings/k6-archive-keyring.gpg] https://dl.k6.io/deb stable main" \
            | sudo tee /etc/apt/sources.list.d/k6.list
          sudo apt-get update -q && sudo apt-get install -q k6

      - name: Run smoke tests
        run: k6 run k6/smoke.js
        env:
          BASE_URL: http://localhost:8080

      - name: Stop backend
        if: always()
        run: docker rm -f coav-backend-ci || true
