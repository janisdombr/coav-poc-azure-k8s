name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'images/**'
  pull_request:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'images/**'
  workflow_call:  # called from cd.yml — always runs everything

jobs:
  # Detect which parts of the codebase changed.
  # When triggered via workflow_call (CD deploy), all outputs are forced to true.
  changes:
    runs-on: ubuntu-latest
    outputs:
      backend:  ${{ github.event_name == 'workflow_call' || steps.filter.outputs.backend == 'true' }}
      frontend: ${{ github.event_name == 'workflow_call' || steps.filter.outputs.frontend == 'true' }}
      emulator: ${{ github.event_name == 'workflow_call' || steps.filter.outputs.emulator == 'true' }}
      k6:       ${{ github.event_name == 'workflow_call' || steps.filter.outputs.k6 == 'true' }}
      edge-pi:  ${{ github.event_name == 'workflow_call' || steps.filter.outputs.edge-pi == 'true' }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            backend:
              - 'coav-gui/backend/**'
            frontend:
              - 'coav-gui/frontend/**'
            emulator:
              - 'edge-emulator/**'
            k6:
              - 'k6/**'
              - 'coav-gui/backend/**'
            edge-pi:
              - 'edge-pi/**'

  backend-tests:
    name: Backend — Maven (44 tests)
    needs: changes
    if: needs.changes.outputs.backend == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run tests in Maven Docker image
        run: |
          docker run --rm \
            -v "$PWD/coav-gui/backend":/build \
            -w /build \
            maven:3.9-eclipse-temurin-21-alpine \
            mvn test -q

  frontend-build:
    name: Frontend — TypeScript + build
    needs: changes
    if: needs.changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: coav-gui/frontend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: coav-gui/frontend

      - name: Type-check and build
        run: npm run build
        working-directory: coav-gui/frontend

      - name: Unit tests
        run: npm test
        working-directory: coav-gui/frontend

      - name: No hardcoded relative /api fetch calls
        working-directory: coav-gui/frontend
        run: |
          # Every fetch('/api...) in src/ must use ${backendUrl}/api/... instead.
          # In production, nginx does not proxy /api — the frontend must call the
          # backend directly via window.BACKEND_URL injected by /config.js.
          # Excludes: test files (__tests__/) and comment lines (leading * or //)
          if grep -rn "fetch(['\`]/api" src/ \
               --include="*.ts" --include="*.vue" \
               --exclude-dir="__tests__" \
             | grep -v '^\s*\*' | grep -v '^\s*//'; then
            echo ""
            echo "ERROR: Found relative /api fetch URL."
            echo "Use \${backendUrl}/api/... where backendUrl comes from useFlightStore()."
            exit 1
          fi

  edge-pi-tests:
    name: Edge-Pi — pytest (65 tests)
    needs: changes
    if: needs.changes.outputs.edge-pi == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: edge-pi/python/requirements.txt

      - name: Install inference dependencies (no torch — opencv + pydantic only)
        run: pip install opencv-python-headless numpy pydantic azure-eventhub pytest

      - name: Run pytest
        run: python -m pytest test_inference.py test_capture.py -v
        working-directory: edge-pi/python

  emulator-tests:
    name: Emulator — pytest (22 tests)
    needs: changes
    if: needs.changes.outputs.emulator == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: edge-emulator/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt
        working-directory: edge-emulator

      - name: Run pytest
        run: python -m pytest test_emulator.py -v
        working-directory: edge-emulator

  playwright-e2e:
    name: Playwright E2E — 14 tests (Chromium)
    needs: [changes, backend-tests, frontend-build]
    if: |
      (needs.changes.outputs.frontend == 'true' || needs.changes.outputs.backend == 'true') &&
      (needs.backend-tests.result == 'success' || needs.backend-tests.result == 'skipped') &&
      (needs.frontend-build.result == 'success' || needs.frontend-build.result == 'skipped')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Start backend in mock mode
        run: |
          docker build -t coav-backend-e2e ./coav-gui/backend
          docker run -d -p 8080:8080 \
            -e SPRING_PROFILES_ACTIVE=mock \
            --name coav-backend-e2e \
            coav-backend-e2e
          for i in $(seq 1 30); do
            curl -sf http://localhost:8080/api/issr-zones && break
            sleep 2
          done

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: coav-gui/frontend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: coav-gui/frontend

      - name: Install Playwright Chromium
        run: npx playwright install chromium --with-deps
        working-directory: coav-gui/frontend

      - name: Run Playwright tests
        run: npm run test:e2e
        working-directory: coav-gui/frontend

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: coav-gui/frontend/playwright-report/
          retention-days: 7

      - name: Stop backend
        if: always()
        run: docker rm -f coav-backend-e2e || true

  k6-smoke:
    name: k6 smoke — API endpoints
    needs: [changes, backend-tests]
    # Run if k6 or backend paths changed AND backend either passed or was skipped (paths unchanged)
    if: |
      needs.changes.outputs.k6 == 'true' &&
      (needs.backend-tests.result == 'success' || needs.backend-tests.result == 'skipped')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Start backend in mock mode
        run: |
          docker build -t coav-backend-ci ./coav-gui/backend
          docker run -d -p 8080:8080 \
            -e SPRING_PROFILES_ACTIVE=mock \
            --name coav-backend-ci \
            coav-backend-ci
          for i in $(seq 1 30); do
            curl -sf http://localhost:8080/api/issr-zones && break
            sleep 2
          done

      - name: Install k6
        run: |
          sudo gpg -k
          sudo gpg --no-default-keyring --keyring /usr/share/keyrings/k6-archive-keyring.gpg \
            --keyserver hkp://keyserver.ubuntu.com:80 --recv-keys C5AD17C747E3415A3642D57D77C6C491D6AC1D69
          echo "deb [signed-by=/usr/share/keyrings/k6-archive-keyring.gpg] https://dl.k6.io/deb stable main" \
            | sudo tee /etc/apt/sources.list.d/k6.list
          sudo apt-get update -q && sudo apt-get install -q k6

      - name: Run smoke tests
        run: k6 run k6/smoke.js
        env:
          BASE_URL: http://localhost:8080

      - name: Stop backend
        if: always()
        run: docker rm -f coav-backend-ci || true
